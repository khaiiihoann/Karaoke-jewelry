<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chính sách — KARAOKE JEWELRY</title>
<meta name="description" content="Chính sách hoàn trả, vận chuyển, bảo mật và điều khoản dịch vụ của KARAOKE JEWELRY.">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#fff;color:#111;}
a,a:visited{color:inherit;text-decoration:none;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:46px;position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #111;}
.nav-l,.nav-r{display:flex;gap:20px;align-items:center;}
.nav-l a,.nav-r a{font-size:11px;letter-spacing:.07em;color:#111;text-transform:uppercase;}
.nav-logo{position:absolute;left:50%;transform:translateX(-50%);}
.nav-logo img{height:22px;display:block;}

.page-wrap{max-width:680px;margin:0 auto;padding:100px 24px 80px;}
.page-title{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:#888;margin-bottom:48px;}

.policy-nav{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:56px;border-bottom:1px solid #e0e0e0;padding-bottom:20px;}
.policy-nav a{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#888;}
.policy-nav a:hover{color:#111;}

.policy-section{margin-bottom:56px;}
.policy-section h2{font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;font-weight:400;}
.policy-body p{font-size:13px;line-height:1.9;color:#444;margin-bottom:14px;}
.policy-body ul{font-size:13px;line-height:1.9;color:#444;margin-bottom:14px;padding-left:18px;}
.policy-body ul li{margin-bottom:4px;}
.policy-body a{color:#111;text-decoration:underline;}
.divider{border:none;border-top:1px solid #e0e0e0;margin-bottom:56px;}

.footer{border-top:1px solid #111;padding:13px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.footer-links{display:flex;gap:16px;flex-wrap:wrap;}
.footer-links a,.footer-ig{font-size:12px;letter-spacing:.01em;color:#888;}
.footer-links a:hover,.footer-ig:hover{color:#111;}

.lang-btn .lang-vi,.lang-btn .lang-en{color:#aaa;transition:color .15s;}
[data-lang="vi"] .lang-btn .lang-vi,[data-lang="en"] .lang-btn .lang-en{color:#111;font-weight:600;}

@media(max-width:768px){
  .nav-l{display:none;}
  .nav-r a{display:none;}
  .nav{justify-content:center;}
  .page-wrap{padding:80px 18px 60px;}
  .footer{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-l">
    <a href="shop.html" data-vi="cửa hàng" data-en="shop">cửa hàng</a>
    <a href="#" data-vi="bộ sưu tập" data-en="collections">bộ sưu tập</a>
    <a href="#" data-vi="giới thiệu" data-en="about">giới thiệu</a>
  </div>
  <div class="nav-logo">
    <a href="index.html"><img src="Brand Asset/logo/LOGO_NGANG_BLACK.png" alt="KARAOKE JEWELRY"></a>
  </div>
  <div class="nav-r">
    <button class="lang-btn" onclick="toggleLang()"><span class="lang-vi">Việt Nam</span> / <span class="lang-en">English</span></button>
    <a href="https://www.instagram.com/karaoke.jewelry/" target="_blank">instagram</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-title" data-vi="Chính sách" data-en="Policies">Chính sách</div>
  <nav class="policy-nav">
    <a href="#refund" data-vi="Hoàn trả" data-en="Refund">Hoàn trả</a>
    <a href="#shipping" data-vi="Vận chuyển" data-en="Shipping">Vận chuyển</a>
    <a href="#privacy" data-vi="Bảo mật" data-en="Privacy">Bảo mật</a>
    <a href="#terms" data-vi="Điều khoản" data-en="Terms">Điều khoản</a>
    <a href="#contact" data-vi="Liên hệ" data-en="Contact">Liên hệ</a>
  </nav>
  <div id="policyContent">
    <div style="padding:40px 0;font-size:11px;letter-spacing:.1em;color:#aaa;">Loading...</div>
  </div>
</div>

<footer class="footer">
  <div class="footer-links">
    <a href="policies.html#refund">refund policy</a>
    <a href="policies.html#privacy">privacy policy</a>
    <a href="policies.html#terms">terms of service</a>
    <a href="policies.html#shipping">shipping policy</a>
    <a href="policies.html#contact">contact</a>
  </div>
  <a href="https://www.instagram.com/karaoke.jewelry/" target="_blank" class="footer-ig">instagram</a>
</footer>

<script src="sanity.js"></script>
<script>
const DEFAULTS = {
  vi: {
    policyRefund: `Tất cả sản phẩm của KARAOKE JEWELRY đều là made to order.

- Chấp nhận đổi/trả trong vòng 7 ngày kể từ ngày nhận hàng
- Sản phẩm chưa qua sử dụng, còn nguyên vẹn
- Có lỗi từ phía nhà sản xuất (hàng lỗi, sai sản phẩm)
- Còn đầy đủ bao bì gốc

Để yêu cầu đổi/trả, liên hệ qua Instagram @karaoke.jewelry kèm ảnh sản phẩm.`,
    policyShipping: `Tất cả sản phẩm được làm thủ công sau khi đặt hàng.

- Thời gian xử lý: 7–14 ngày làm việc
- Giao hàng nội địa: 2–4 ngày sau khi hoàn thành
- Giao hàng quốc tế: 7–21 ngày (liên hệ để biết thêm)

Phí vận chuyển được tính tại bước thanh toán. Đặt hàng qua Instagram @karaoke.jewelry.`,
    policyPrivacy: `KARAOKE JEWELRY chỉ thu thập thông tin cần thiết để xử lý đơn hàng.

- Tên và địa chỉ giao hàng
- Số điện thoại liên lạc
- Thông tin đơn hàng trao đổi qua Instagram

Thông tin của bạn không được chia sẻ với bên thứ ba, ngoại trừ đơn vị vận chuyển để giao hàng.`,
    policyTerms: `Bằng cách đặt hàng tại KARAOKE JEWELRY, bạn đồng ý với các điều khoản sau:

- Tất cả sản phẩm là bạc 925 sterling silver, làm thủ công tại Việt Nam
- Màu sắc và chi tiết thực tế có thể chênh lệch nhẹ so với hình ảnh
- Đơn hàng được xác nhận sau khi thanh toán qua Instagram
- Website karaoke-jewelry.com chỉ để xem giá — đặt hàng qua Instagram`,
    policyContact: `Mọi thắc mắc vui lòng liên hệ qua:

- Instagram: @karaoke.jewelry
- Thời gian phản hồi: trong vòng 24 giờ (trừ cuối tuần và ngày lễ)`,
  },
  en: {
    policyRefund: `All KARAOKE JEWELRY products are made to order.

- Returns accepted within 7 days of receiving the item
- Item must be unused and in original condition
- Manufacturing defects or wrong item only
- Original packaging must be intact

To request a return, contact us via Instagram @karaoke.jewelry with photos of the item.`,
    policyShipping: `All products are handcrafted after your order is placed.

- Processing time: 7–14 business days
- Domestic delivery: 2–4 days after completion
- International delivery: 7–21 days (contact us for details)

Shipping fees are calculated at checkout. Order via Instagram @karaoke.jewelry.`,
    policyPrivacy: `KARAOKE JEWELRY only collects information necessary to process your order.

- Name and shipping address
- Contact phone number
- Order details communicated via Instagram

Your information is not shared with third parties, except the shipping carrier for delivery.`,
    policyTerms: `By ordering from KARAOKE JEWELRY, you agree to the following:

- All products are 925 sterling silver, handmade in Vietnam
- Actual colors and details may vary slightly from photos
- Orders are confirmed after payment via Instagram
- karaoke-jewelry.com is for price viewing only — order via Instagram`,
    policyContact: `For any inquiries, please contact us via:

- Instagram: @karaoke.jewelry
- Response time: within 24 hours (excluding weekends and holidays)`,
  },
};

let _settings = null;

const TITLES = {
  vi: {refund:'Chính sách hoàn trả', shipping:'Chính sách vận chuyển', privacy:'Chính sách bảo mật', terms:'Điều khoản dịch vụ', contact:'Liên hệ'},
  en: {refund:'Refund Policy', shipping:'Shipping Policy', privacy:'Privacy Policy', terms:'Terms of Service', contact:'Contact'},
};

function renderText(text) {
  if (!text) return '';
  return text.split(/\n\n+/).map(para => {
    const lines = para.trim().split('\n');
    if (lines.length > 1 && lines.every(l => l.startsWith('- '))) {
      return '<ul>' + lines.map(l => `<li>${l.slice(2)}</li>`).join('') + '</ul>';
    }
    if (lines[0].startsWith('- ')) {
      const items = lines.filter(l => l.startsWith('- '));
      const rest = lines.filter(l => !l.startsWith('- '));
      return (rest.length ? `<p>${rest.join('<br>')}</p>` : '') +
             '<ul>' + items.map(l => `<li>${l.slice(2)}</li>`).join('') + '</ul>';
    }
    return `<p>${para.trim().replace(/\n/g, '<br>')}</p>`;
  }).join('');
}

function section(id, title, text) {
  return `
    <section class="policy-section" id="${id}">
      <h2>${title}</h2>
      <div class="policy-body">${renderText(text)}</div>
    </section>
    <hr class="divider">
  `;
}

function renderPolicies() {
  const l = getLang();
  const s = _settings || {};
  const t = TITLES[l];
  const d = DEFAULTS[l];
  const enSuffix = l === 'en' ? '_en' : '';
  document.getElementById('policyContent').innerHTML =
    section('refund',   t.refund,   (l==='en'?s.policyRefund_en:s.policyRefund)   || d.policyRefund) +
    section('shipping', t.shipping, (l==='en'?s.policyShipping_en:s.policyShipping) || d.policyShipping) +
    section('privacy',  t.privacy,  (l==='en'?s.policyPrivacy_en:s.policyPrivacy)  || d.policyPrivacy) +
    section('terms',    t.terms,    (l==='en'?s.policyTerms_en:s.policyTerms)      || d.policyTerms) +
    section('contact',  t.contact,  (l==='en'?s.policyContact_en:s.policyContact)  || d.policyContact);
}

initLang();
window.addEventListener('langchange', renderPolicies);

async function init() {
  _settings = await sanityFetch('*[_type=="settings"][0]{policyRefund,policyShipping,policyPrivacy,policyTerms,policyContact,policyRefund_en,policyShipping_en,policyPrivacy_en,policyTerms_en,policyContact_en,navLeft,navRight,footerLinks,instagramUrl}');
  applySettings(_settings);
  renderPolicies();

  const hash = window.location.hash;
  if (hash) {
    setTimeout(() => document.querySelector(hash)?.scrollIntoView({behavior:'smooth'}), 100);
  }
}

init();
</script>
</body>
</html>
