<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Store — KARAOKE JEWELRY</title>
<meta name="description" content="KARAOKE JEWELRY Store — 402 Hai Bà Trưng, Phường Tân Định, TP Hồ Chí Minh. Mở cửa 9:00 - 21:00 hàng ngày.">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#fff;color:#111;display:flex;flex-direction:column;min-height:100vh;}
a,a:visited{color:inherit;text-decoration:none;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:46px;position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #111;}
.nav-l,.nav-r{display:flex;gap:20px;align-items:center;}
.nav-l a,.nav-r a{font-size:11px;letter-spacing:.07em;color:#111;text-transform:uppercase;}
.nav-logo{position:absolute;left:50%;transform:translateX(-50%);}
.nav-logo img{height:22px;display:block;}

.page-wrap{max-width:900px;width:100%;margin:auto;padding:80px 24px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}

.store-info{}
.page-label{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#888;margin-bottom:36px;display:block;}
.store-name{font-size:13px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:32px;font-weight:400;}

.info-block{margin-bottom:28px;}
.info-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-bottom:8px;}
.info-value{font-size:13px;line-height:1.8;color:#111;}

.hours-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 20px;}
.hours-grid span{font-size:13px;color:#111;line-height:1.8;}
.hours-grid .day{color:#888;}

.ig-link{display:inline-block;margin-top:24px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#111;border-bottom:1px solid #111;padding-bottom:2px;}

.map-side{}
.map-wrap{width:100%;aspect-ratio:1/1;border:1px solid #111;overflow:hidden;}
.map-wrap iframe{width:100%;height:100%;border:none;display:block;}

.footer{border-top:1px solid #111;padding:13px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;}
.footer-links{display:flex;gap:16px;}
.footer-links a,.footer-ig{font-size:12px;letter-spacing:.01em;color:#888;}
.footer-links a:hover,.footer-ig:hover{color:#111;}

.lang-btn .lang-vi,.lang-btn .lang-en{color:#aaa;transition:color .15s;}
[data-lang="vi"] .lang-btn .lang-vi,[data-lang="en"] .lang-btn .lang-en{color:#111;}
.lang-short{display:none;}

.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:#111;padding:4px;line-height:1;}
.mobile-menu{display:none;position:fixed;top:46px;left:0;right:0;background:#fff;border-bottom:1px solid #111;z-index:98;padding:0 20px;}
.mobile-menu.open{display:block;}
.mobile-menu a{display:block;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#111;padding:14px 0;border-bottom:1px solid #f0f0f0;}
.mobile-menu a:last-child{border-bottom:none;}

@media(max-width:768px){
  .lang-long{display:none;}
  .lang-short{display:inline;}
  .nav-l a{display:none;}
  .hamburger{display:block;}
  .nav-r a{display:none;}
  .nav{justify-content:space-between;}
  .page-wrap{grid-template-columns:1fr;padding:80px 18px 60px;gap:40px;}
  .map-wrap{aspect-ratio:4/3;}
  .footer{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-l">
    <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
    <a href="shop.html" data-vi="cửa hàng" data-en="shop">cửa hàng</a>
    <a href="#" data-vi="bộ sưu tập" data-en="collections">bộ sưu tập</a>
    <a href="#" data-vi="giới thiệu" data-en="about">giới thiệu</a>
  </div>
  <div class="nav-logo">
    <a href="index.html"><img src="Brand Asset/logo/LOGO_NGANG_BLACK.png" alt="KARAOKE JEWELRY"></a>
  </div>
  <div class="nav-r">
    <button class="lang-btn" onclick="toggleLang()"><span class="lang-vi"><span class="lang-long">Việt Nam</span><span class="lang-short">VI</span></span> / <span class="lang-en"><span class="lang-long">English</span><span class="lang-short">EN</span></span></button>
    <a href="https://www.instagram.com/karaoke.jewelry/" target="_blank">instagram</a>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu"></div>

<div class="page-wrap">
  <div class="store-info">
    <span class="page-label">Store</span>
    <div class="store-name">KARAOKE JEWELRY</div>

    <div class="info-block">
      <div class="info-label" data-vi="Địa chỉ" data-en="Address">Địa chỉ</div>
      <div class="info-value">402 Hai Bà Trưng<br>Phường Tân Định<br>TP Hồ Chí Minh</div>
    </div>

    <div class="info-block">
      <div class="info-label" data-vi="Giờ mở cửa" data-en="Hours">Giờ mở cửa</div>
      <div class="hours-grid">
        <span class="day" data-vi="Thứ 2 – Chủ nhật" data-en="Mon – Sun">Thứ 2 – Chủ nhật</span>
        <span>9:00 – 21:00</span>
      </div>
    </div>

    <div class="info-block">
      <div class="info-label" data-vi="Liên hệ" data-en="Contact">Liên hệ</div>
      <div class="info-value">
        <a href="https://www.instagram.com/karaoke.jewelry/" target="_blank" class="ig-link">Instagram @karaoke.jewelry</a>
      </div>
    </div>
  </div>

  <div class="map-side">
    <div class="map-wrap">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1959.5!2d106.6882643!3d10.7909484!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x317529685947f861%3A0x39681389f646079e!2sKARAOKE%20JEWELRY!5e0!3m2!1svi!2svn!4v1714000000000!5m2!1svi!2svn"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-links">
    <a href="policies.html" data-vi="chính sách" data-en="policies">chính sách</a>
    <a href="policies.html#contact" data-vi="liên hệ" data-en="contact">liên hệ</a>
    <a href="store.html" data-vi="cửa hàng" data-en="store">cửa hàng</a>
  </div>
  <a href="https://www.instagram.com/karaoke.jewelry/" target="_blank" class="footer-ig">instagram</a>
</footer>

<script src="sanity.js"></script>
<script>
initLang();
initMobileMenu();
</script>
</body>
</html>
